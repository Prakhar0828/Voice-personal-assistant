AWSTemplateFormatVersion: "2010-09-09"
Description: ECR repository for Voice Personal Assistant (push image before App Runner stack)

Resources:
  Repository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: voice-personal-assistant
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": { "type": "expire" }
              }
            ]
          }

Outputs:
  RepositoryUri:
    Description: docker tag/push target (add :latest or :tag)
    Value: !GetAtt Repository.RepositoryUri
  RepositoryArn:
    Value: !GetAtt Repository.Arn
