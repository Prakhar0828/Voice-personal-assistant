# AWS Amplify Hosting — connect this GitHub repo in the Amplify console (Hosting → Host web app).
# Set environment variables in Amplify: App settings → Environment variables (same names as .env.example).
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
